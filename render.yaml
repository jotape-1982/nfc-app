# render.yaml actualizado - sin base de datos (usar Neon.tech para la BD)
# El frontend se despliega por separado en Vercel

services:
  - type: web
    name: nfc-app-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false          # Lo ingresas manualmente desde Neon
      - key: JWT_SECRET_KEY
        generateValue: true  # Render genera uno automáticamente
      - key: ALLOWED_ORIGINS
        sync: false          # Ej: https://tu-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
